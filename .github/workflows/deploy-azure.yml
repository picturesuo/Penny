name: Deploy Azure Container

on:
  workflow_dispatch:

env:
  IMAGE_NAME: penny

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate required deployment secrets
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PENNY_API_TOKEN: ${{ secrets.PENNY_API_TOKEN }}
          PENNY_CORS_ORIGINS: ${{ secrets.PENNY_CORS_ORIGINS }}
          PENNY_SESSION_SECRET: ${{ secrets.PENNY_SESSION_SECRET }}
        run: |
          missing=()
          for name in \
            ACR_LOGIN_SERVER \
            ACR_USERNAME \
            ACR_PASSWORD \
            AZURE_CREDENTIALS \
            AZURE_RESOURCE_GROUP \
            AZURE_WEBAPP_NAME \
            DATABASE_URL \
            PENNY_API_TOKEN \
            PENNY_CORS_ORIGINS \
            PENNY_SESSION_SECRET; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ ${#missing[@]} -gt 0 ]]; then
            printf 'Missing required GitHub secrets:\n' >&2
            printf ' - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Point App Service at the latest image
        run: |
          az webapp config container set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --docker-custom-image-name "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" \
            --docker-registry-server-url "https://${{ secrets.ACR_LOGIN_SERVER }}" \
            --docker-registry-server-user "${{ secrets.ACR_USERNAME }}" \
            --docker-registry-server-password "${{ secrets.ACR_PASSWORD }}"

      - name: Apply Penny production settings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PENNY_API_TOKEN: ${{ secrets.PENNY_API_TOKEN }}
          PENNY_CORS_ORIGINS: ${{ secrets.PENNY_CORS_ORIGINS }}
          PENNY_SESSION_SECRET: ${{ secrets.PENNY_SESSION_SECRET }}
        run: |
          az webapp config appsettings set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}" \
            --settings \
              NODE_ENV=production \
              PORT=3000 \
              WEBSITES_PORT=3000 \
              PENNY_DEPLOY_ENV=private-alpha \
              PENNY_AUTH_MODE=token \
              PENNY_API_TOKEN="$PENNY_API_TOKEN" \
              PENNY_SESSION_SECRET="$PENNY_SESSION_SECRET" \
              PENNY_CORS_ORIGINS="$PENNY_CORS_ORIGINS" \
              PENNY_RATE_LIMIT_MAX=120 \
              PENNY_RATE_LIMIT_WINDOW_MS=60000 \
              PENNY_AUTH_FAILURE_RATE_LIMIT_MAX=10 \
              PENNY_AUTH_FAILURE_RATE_LIMIT_WINDOW_MS=60000 \
              PENNY_TRUST_AUTH_HEADERS=false \
              PENNY_STRUCTURED_LOGS=true \
              PENNY_CREATE_MODEL_BACKED=false \
              PENNY_AUTO_MIGRATE=true \
              ENABLE_GMAIL_CONNECTOR=false \
              ENABLE_RESTRICTED_GOOGLE_SCOPES=false \
              DATABASE_URL="$DATABASE_URL" \
            --output none

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ secrets.AZURE_WEBAPP_NAME }}"

      - name: Smoke deployed Penny
        env:
          AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}
          PENNY_API_TOKEN: ${{ secrets.PENNY_API_TOKEN }}
          PENNY_PUBLIC_SMOKE_BASE_URL: ${{ secrets.PENNY_PUBLIC_SMOKE_BASE_URL }}
        run: |
          export PENNY_PUBLIC_SMOKE_BASE_URL="${PENNY_PUBLIC_SMOKE_BASE_URL:-https://$AZURE_WEBAPP_NAME.azurewebsites.net}"
          export PENNY_PUBLIC_SMOKE_API_TOKEN="$PENNY_API_TOKEN"
          export PENNY_PUBLIC_SMOKE_RUN_ID="gha-${GITHUB_RUN_ID}"
          node scripts/smoke-public-staging.mjs
